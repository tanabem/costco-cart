<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COSTCO CART - ショッピング計算</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #003087 0%, #001a4d 100%);
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    padding-bottom: 80px;
    color: #fff;
  }
  input { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* Header */
  #header {
    background: linear-gradient(90deg, #003087, #0046BE);
    padding: 20px 20px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { max-width: 480px; margin: 0 auto; }
  .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .header-logo { font-size: 28px; }
  .header-title { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
  .header-sub { color: #99b8ff; font-size: 11px; letter-spacing: 2px; margin-top: 2px; }
  .header-total { margin-left: auto; text-align: right; }
  .header-total-label { color: #cdd8ff; font-size: 11px; }
  .header-total-amount { font-size: 26px; font-weight: 900; line-height: 1; transition: color 0.3s; }
  .budget-bar-wrap { margin-top: 8px; }
  .budget-bar-bg { background: rgba(255,255,255,0.1); border-radius: 6px; height: 8px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
  .budget-bar-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; }

  /* Main */
  #main { max-width: 480px; margin: 0 auto; padding: 16px 16px 0; }

  /* Card */
  .card {
    background: rgba(255,255,255,0.07);
    border-radius: 14px; padding: 12px 16px; margin-bottom: 14px;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .card-form {
    background: rgba(255,255,255,0.09);
    border-radius: 16px; padding: 16px; margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* Budget */
  .budget-display { cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .budget-edit { display: flex; gap: 8px; align-items: center; }
  .budget-edit input {
    flex: 1; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
    padding: 6px 10px; color: #fff; font-size: 16px; outline: none;
  }
  .btn-small {
    background: #0046BE; color: #fff; border: none; border-radius: 8px;
    padding: 6px 14px; cursor: pointer; font-weight: 700; font-size: 13px;
  }

  /* Form */
  .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .form-label { color: #99b8ff; font-size: 12px; font-weight: 700; letter-spacing: 1px; }
  .btn-camera {
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, #003087, #0046BE);
    border: 1px solid rgba(127,200,255,0.4); border-radius: 10px;
    padding: 8px 14px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,70,190,0.4);
  }

  /* Categories */
  .cat-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .cat-btn {
    padding: 5px 10px; border-radius: 20px; border: 2px solid transparent;
    background: rgba(255,255,255,0.05); color: #aaa;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }

  /* Inputs */
  .input-text {
    width: 100%; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
    padding: 10px 14px; color: #fff; font-size: 15px; outline: none;
    margin-bottom: 8px;
  }
  .input-row { display: flex; gap: 8px; }
  .price-wrap { position: relative; flex: 2; }
  .price-symbol {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: #99b8ff; font-size: 15px; font-weight: 700;
  }
  .input-price {
    width: 100%; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
    padding: 10px 14px 10px 28px; color: #fff; font-size: 15px; outline: none;
  }
  .input-qty {
    flex: 1; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
    padding: 10px 14px; color: #fff; font-size: 15px; outline: none;
  }
  .btn-add {
    background: linear-gradient(135deg, #0046BE, #0066ff);
    color: #fff; border: none; border-radius: 10px;
    padding: 10px 18px; font-size: 22px; cursor: pointer;
    font-weight: 900; box-shadow: 0 4px 14px rgba(0,70,190,0.5); flex-shrink: 0;
  }

  /* Empty */
  .empty { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.25); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* Item */
  .item {
    background: rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
    border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px;
    transition: all 0.3s;
  }
  .item.new { background: rgba(127,255,0,0.12); border-color: rgba(127,255,0,0.4); }
  .item-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-sub { color: #99b8ff; font-size: 12px; }
  .item-right { text-align: right; flex-shrink: 0; }
  .item-total { color: #7FFF00; font-size: 15px; font-weight: 800; }
  .item-btns { display: flex; gap: 4px; margin-top: 4px; justify-content: flex-end; }
  .btn-qty {
    width: 24px; height: 24px; background: rgba(255,255,255,0.1);
    border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 14px; font-weight: 700;
  }
  .btn-del { width: 24px; height: 24px; background: rgba(255,80,80,0.2); border: none; border-radius: 6px; color: #ff6b6b; cursor: pointer; font-size: 14px; }

  /* Summary */
  .summary {
    background: rgba(0,70,190,0.25); border: 1px solid rgba(0,102,255,0.4);
    border-radius: 16px; padding: 16px; margin-top: 8px;
  }
  .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .summary-label { color: #99b8ff; font-size: 14px; }
  .summary-val { font-size: 14px; font-weight: 700; }
  .summary-total-row { border-top: 1px solid rgba(255,255,255,0.15); padding-top: 10px; display: flex; justify-content: space-between; align-items: center; }
  .summary-total-label { font-size: 16px; font-weight: 700; }
  .summary-total-val { font-size: 24px; font-weight: 900; }
  .summary-budget-msg { margin-top: 8px; padding: 8px 12px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 14px; }
  .summary-count { text-align: center; margin-top: 10px; color: #5577cc; font-size: 12px; }

  /* Camera Modal */
  #camera-modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.93); flex-direction: column;
  }
  #camera-modal.open { display: flex; }
  .modal-header {
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,26,77,0.95); border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .modal-header-title { font-weight: 800; font-size: 16px; }
  .modal-header-sub { color: #99b8ff; font-size: 11px; margin-top: 2px; }
  .btn-close {
    background: rgba(255,255,255,0.1); border: none; border-radius: 8px;
    color: #fff; padding: 8px 14px; cursor: pointer; font-size: 13px;
  }
  .modal-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 16px; }
  .viewfinder {
    width: 100%; max-width: 440px; border-radius: 16px; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15); position: relative;
    background: #000; aspect-ratio: 4/3;
  }
  #camera-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #camera-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
  .scan-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;
  }
  .scan-frame {
    width: 72%; height: 42%; border: 2px solid rgba(127,255,0,0.7); border-radius: 12px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4); position: relative;
  }
  .corner { position: absolute; width: 22px; height: 22px; }
  .corner-tl { top: -1px; left: -1px; border-top: 3px solid #7FFF00; border-left: 3px solid #7FFF00; border-radius: 8px 0 0 0; }
  .corner-tr { top: -1px; right: -1px; border-top: 3px solid #7FFF00; border-right: 3px solid #7FFF00; border-radius: 0 8px 0 0; }
  .corner-bl { bottom: -1px; left: -1px; border-bottom: 3px solid #7FFF00; border-left: 3px solid #7FFF00; border-radius: 0 0 0 8px; }
  .corner-br { bottom: -1px; right: -1px; border-bottom: 3px solid #7FFF00; border-right: 3px solid #7FFF00; border-radius: 0 0 8px 0; }
  .analyzing-overlay {
    display: none; position: absolute; inset: 0; background: rgba(0,26,77,0.75);
    flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .analyzing-overlay.show { display: flex; }
  .spinner {
    width: 52px; height: 52px;
    border: 4px solid rgba(255,255,255,0.15); border-top: 4px solid #7FFF00;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result-card {
    display: none; width: 100%; max-width: 440px;
    background: rgba(0,70,190,0.25); border: 1px solid rgba(0,102,255,0.5);
    border-radius: 16px; padding: 20px;
  }
  .result-card.show { display: block; }
  #result-preview { width: 100%; border-radius: 10px; margin-bottom: 16px; max-height: 160px; object-fit: cover; }
  .result-label { color: #99b8ff; font-size: 12px; margin-bottom: 10px; letter-spacing: 1px; }
  .result-name-label { color: #cdd8ff; font-size: 11px; margin-bottom: 3px; }
  .result-name { font-size: 18px; font-weight: 800; margin-bottom: 12px; }
  .result-price-label { color: #cdd8ff; font-size: 11px; margin-bottom: 3px; }
  .result-price { color: #7FFF00; font-size: 28px; font-weight: 900; }
  .result-warn { color: #ffcc44; font-size: 12px; background: rgba(255,200,0,0.1); padding: 8px 12px; border-radius: 8px; margin-top: 10px; }
  .error-card {
    display: none; background: rgba(255,0,0,0.13); border: 1px solid rgba(255,100,100,0.4);
    border-radius: 14px; padding: 24px; text-align: center;
    color: #ff9999; max-width: 380px; line-height: 1.8; font-size: 14px; width: 100%;
  }
  .error-card.show { display: block; }
  .modal-footer {
    padding: 16px 20px; display: flex; gap: 10px;
    background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.08);
  }
  .btn-retake {
    flex: 1; padding: 14px; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .btn-capture {
    flex: 1; padding: 16px; background: linear-gradient(135deg, #0046BE, #0066ff);
    border: none; border-radius: 14px; color: #fff;
    font-size: 16px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 20px rgba(0,70,190,0.5);
  }
  .btn-analyze {
    flex: 2; padding: 14px; background: linear-gradient(135deg, #0046BE, #0066ff);
    border: none; border-radius: 12px; color: #fff;
    font-size: 15px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 16px rgba(0,70,190,0.5);
  }
  .btn-confirm {
    flex: 2; padding: 14px; background: linear-gradient(135deg, #1a7a00, #2db800);
    border: none; border-radius: 12px; color: #fff;
    font-size: 15px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 16px rgba(45,184,0,0.4);
  }
</style>
</head>
<body>

<!-- Camera Modal -->
<div id="camera-modal">
  <div class="modal-header">
    <div>
      <div class="modal-header-title">📷 値札スキャン</div>
      <div class="modal-header-sub" id="modal-sub">値札にカメラを向けて撮影してください</div>
    </div>
    <button class="btn-close" onclick="closeCamera()">✕ 閉じる</button>
  </div>
  <div class="modal-body">
    <div class="viewfinder" id="viewfinder">
      <video id="camera-video" autoplay playsinline muted></video>
      <img id="camera-preview" alt="captured">
      <div class="scan-overlay" id="scan-overlay">
        <div class="scan-frame">
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
        </div>
      </div>
      <div class="analyzing-overlay" id="analyzing-overlay">
        <div class="spinner"></div>
        <div style="font-weight:700;font-size:15px;">AIが解析中...</div>
      </div>
    </div>
    <canvas id="camera-canvas" style="display:none;"></canvas>

    <div class="result-card" id="result-card">
      <img id="result-preview" alt="captured">
      <div class="result-label">📋 読み取り結果</div>
      <div class="result-name-label">商品名</div>
      <div class="result-name" id="result-name">-</div>
      <div class="result-price-label">価格（税抜）</div>
      <div class="result-price" id="result-price">-</div>
      <div class="result-warn" id="result-warn" style="display:none;">⚠️ 一部読み取れなかった項目は手動で補完してください</div>
    </div>

    <div class="error-card" id="error-card">⚠️ <span id="error-msg"></span></div>
  </div>
  <div class="modal-footer" id="modal-footer">
    <button class="btn-capture" onclick="capture()">📸 撮影する</button>
  </div>
</div>

<!-- Header -->
<div id="header">
  <div class="header-inner">
    <div class="header-row">
      <div class="header-logo">🏪</div>
      <div>
        <div class="header-title">COSTCO CART</div>
        <div class="header-sub">ショッピング合計計算</div>
      </div>
      <div class="header-total">
        <div class="header-total-label">合計（税込）</div>
        <div class="header-total-amount" id="header-total">¥0</div>
      </div>
    </div>
    <div class="budget-bar-wrap" id="budget-bar-wrap" style="display:none;">
      <div class="budget-bar-bg">
        <div class="budget-bar-fill" id="budget-bar-fill"></div>
      </div>
      <div class="budget-bar-labels">
        <span style="color:#99b8ff;" id="budget-bar-left">予算: ¥0</span>
        <span id="budget-bar-right" style="font-weight:700;"></span>
      </div>
    </div>
  </div>
</div>

<div id="main">
  <!-- Budget -->
  <div class="card">
    <div class="budget-display" id="budget-display" onclick="editBudget()">
      <span style="font-size:16px;">💰</span>
      <span style="color:#99b8ff;font-size:13px;" id="budget-text">予算を設定する（タップ）</span>
      <span style="color:#5577cc;font-size:12px;margin-left:auto;">✏️</span>
    </div>
    <div class="budget-edit" id="budget-edit" style="display:none;">
      <span style="color:#99b8ff;font-size:13px;">予算:</span>
      <span style="font-size:16px;">¥</span>
      <input type="number" id="budget-input" placeholder="例: 30000" onkeydown="if(event.key==='Enter')confirmBudget()">
      <button class="btn-small" onclick="confirmBudget()">決定</button>
    </div>
  </div>

  <!-- Add Form -->
  <div class="card-form">
    <div class="form-header">
      <div class="form-label">＋ 商品を追加</div>
      <button class="btn-camera" onclick="openCamera()">
        <span style="font-size:15px;">📷</span> 値札を撮影
      </button>
    </div>
    <div class="cat-row" id="cat-row"></div>
    <input class="input-text" type="text" id="item-name" placeholder="商品名" onkeydown="if(event.key==='Enter')addItem()">
    <div class="input-row">
      <div class="price-wrap">
        <span class="price-symbol">¥</span>
        <input class="input-price" type="number" id="item-price" placeholder="価格（税抜）" onkeydown="if(event.key==='Enter')addItem()">
      </div>
      <input class="input-qty" type="number" id="item-qty" value="1" min="1" onkeydown="if(event.key==='Enter')addItem()">
      <button class="btn-add" onclick="addItem()">+</button>
    </div>
  </div>

  <!-- Item list -->
  <div id="item-list">
    <div class="empty">
      <div class="empty-icon">🛒</div>
      <div style="font-size:14px;">📷 値札を撮影するか、手動で商品を追加</div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary" style="display:none;">
    <div class="summary-row">
      <span class="summary-label">小計（税抜）</span>
      <span class="summary-val" id="sum-subtotal"></span>
    </div>
    <div class="summary-row">
      <span class="summary-label">消費税（10%）</span>
      <span class="summary-val" id="sum-tax"></span>
    </div>
    <div class="summary-total-row">
      <span class="summary-total-label">合計（税込）</span>
      <span class="summary-total-val" id="sum-total"></span>
    </div>
    <div class="summary-budget-msg" id="sum-budget-msg" style="display:none;"></div>
    <div class="summary-count" id="sum-count"></div>
  </div>
</div>

<script>
const TAX = 0.10;
const CATEGORIES = [
  { id:"food",     label:"食品",   emoji:"🥩", color:"#E8F5E9", accent:"#2E7D32" },
  { id:"daily",    label:"日用品", emoji:"🧴", color:"#E3F2FD", accent:"#1565C0" },
  { id:"electric", label:"家電",   emoji:"📱", color:"#F3E5F5", accent:"#6A1B9A" },
  { id:"clothing", label:"衣類",   emoji:"👕", color:"#FFF3E0", accent:"#E65100" },
  { id:"other",    label:"その他", emoji:"📦", color:"#FBE9E7", accent:"#BF360C" },
];

let items = [];
let selectedCat = "food";
let budget = 0;
let idCnt = 1;
let currentStream = null;
let capturedDataUrl = null;
let scanResult = null;

// ── Categories ──
const catRow = document.getElementById("cat-row");
CATEGORIES.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "cat-btn";
  btn.id = "cat-" + cat.id;
  btn.textContent = cat.emoji + " " + cat.label;
  btn.onclick = () => selectCat(cat.id);
  catRow.appendChild(btn);
});
selectCat("food");

function selectCat(id) {
  selectedCat = id;
  CATEGORIES.forEach(c => {
    const btn = document.getElementById("cat-" + c.id);
    if (c.id === id) {
      btn.style.borderColor = c.accent;
      btn.style.background = c.color;
      btn.style.color = c.accent;
    } else {
      btn.style.borderColor = "transparent";
      btn.style.background = "rgba(255,255,255,0.05)";
      btn.style.color = "#aaa";
    }
  });
}

// ── Format ──
function yen(v) { return "¥" + Math.round(v).toLocaleString("ja-JP"); }

// ── Budget ──
function editBudget() {
  document.getElementById("budget-display").style.display = "none";
  document.getElementById("budget-edit").style.display = "flex";
  document.getElementById("budget-input").value = budget || "";
  document.getElementById("budget-input").focus();
}
function confirmBudget() {
  budget = parseFloat(document.getElementById("budget-input").value) || 0;
  document.getElementById("budget-display").style.display = "flex";
  document.getElementById("budget-edit").style.display = "none";
  document.getElementById("budget-text").textContent = budget > 0 ? "予算: " + yen(budget) : "予算を設定する（タップ）";
  render();
}

// ── Add Item ──
function addItem() {
  const name = document.getElementById("item-name").value.trim();
  const price = parseFloat(document.getElementById("item-price").value);
  const qty = parseInt(document.getElementById("item-qty").value) || 1;
  if (!name || isNaN(price) || price <= 0) return;
  items.unshift({ id: idCnt++, name, price, qty, category: selectedCat, isNew: true });
  document.getElementById("item-name").value = "";
  document.getElementById("item-price").value = "";
  document.getElementById("item-qty").value = "1";
  document.getElementById("item-name").focus();
  render();
  setTimeout(() => { if (items.length) items[0].isNew = false; render(); }, 700);
}

function removeItem(id) { items = items.filter(i => i.id !== id); render(); }
function updateQty(id, d) {
  items = items.map(i => i.id === id ? { ...i, qty: Math.max(1, i.qty + d) } : i);
  render();
}

// ── Render ──
function render() {
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const tax = subtotal * TAX;
  const total = subtotal + tax;
  const over = budget > 0 && total > budget;
  const remaining = budget - total;

  // header
  const ha = document.getElementById("header-total");
  ha.textContent = yen(total);
  ha.style.color = over ? "#ff6b6b" : "#7FFF00";

  // budget bar
  const bw = document.getElementById("budget-bar-wrap");
  if (budget > 0) {
    bw.style.display = "block";
    const pct = Math.min(100, (total / budget) * 100);
    const fill = document.getElementById("budget-bar-fill");
    fill.style.width = pct + "%";
    fill.style.background = over ? "linear-gradient(90deg,#ff6b6b,#f00)" : "linear-gradient(90deg,#7FFF00,#00e676)";
    document.getElementById("budget-bar-left").textContent = "予算: " + yen(budget);
    const br = document.getElementById("budget-bar-right");
    br.textContent = over ? "超過: " + yen(-remaining) : "残り: " + yen(remaining);
    br.style.color = over ? "#ff6b6b" : "#7FFF00";
  } else {
    bw.style.display = "none";
  }

  // list
  const list = document.getElementById("item-list");
  if (items.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🛒</div><div style="font-size:14px;">📷 値札を撮影するか、手動で商品を追加</div></div>';
  } else {
    list.innerHTML = items.map(item => {
      const cat = CATEGORIES.find(c => c.id === item.category) || CATEGORIES[0];
      return `<div class="item ${item.isNew ? 'new' : ''}">
        <div class="item-icon" style="background:${cat.color};">${cat.emoji}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-sub">${yen(item.price)} × ${item.qty}</div>
        </div>
        <div class="item-right">
          <div class="item-total">${yen(item.price * item.qty)}</div>
          <div class="item-btns">
            <button class="btn-qty" onclick="updateQty(${item.id},-1)">−</button>
            <button class="btn-qty" onclick="updateQty(${item.id},1)">＋</button>
            <button class="btn-del" onclick="removeItem(${item.id})">✕</button>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  // summary
  const sum = document.getElementById("summary");
  if (items.length > 0) {
    sum.style.display = "block";
    document.getElementById("sum-subtotal").textContent = yen(subtotal);
    document.getElementById("sum-tax").textContent = yen(tax);
    const st = document.getElementById("sum-total");
    st.textContent = yen(total);
    st.style.color = over ? "#ff6b6b" : "#7FFF00";
    const msg = document.getElementById("sum-budget-msg");
    if (budget > 0) {
      msg.style.display = "block";
      msg.textContent = over ? `⚠️ 予算を ${yen(-remaining)} オーバー` : `✅ 残り ${yen(remaining)}`;
      msg.style.background = over ? "rgba(255,0,0,0.15)" : "rgba(127,255,0,0.1)";
      msg.style.color = over ? "#ff6b6b" : "#7FFF00";
    } else {
      msg.style.display = "none";
    }
    document.getElementById("sum-count").textContent = items.reduce((s,i)=>s+i.qty,0) + " 点";
  } else {
    sum.style.display = "none";
  }
}

// ── Camera ──
function openCamera() {
  document.getElementById("camera-modal").classList.add("open");
  setPhase("preview");
  startCamera();
}

function closeCamera() {
  stopCamera();
  document.getElementById("camera-modal").classList.remove("open");
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    currentStream = stream;
    const video = document.getElementById("camera-video");
    video.srcObject = stream;
    video.play();
  } catch(e) {
    setPhase("error", "カメラへのアクセスが拒否されました。\nブラウザの設定でカメラを許可してください。");
  }
}

function stopCamera() {
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
}

function capture() {
  const video = document.getElementById("camera-video");
  const canvas = document.getElementById("camera-canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  capturedDataUrl = canvas.toDataURL("image/jpeg", 0.85);
  document.getElementById("camera-preview").src = capturedDataUrl;
  stopCamera();
  setPhase("captured");
}

function retake() {
  capturedDataUrl = null;
  scanResult = null;
  setPhase("preview");
  startCamera();
}

async function analyze() {
  setPhase("analyzing");
  try {
    const base64 = capturedDataUrl.split(",")[1];
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
         "Content-Type": "application/json",
         "x-api-key": "",
         "anthropic-version": "2023-06-01",
         "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 300,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
            { type: "text", text: `この画像はスーパーや量販店の値札・商品タグです。
以下のJSONのみを返してください（説明文・マークダウン不要）:
{"name":"商品名（日本語・簡潔に）","price":数値（税抜き円・数字のみ）,"found":true}
読み取れない場合: {"name":"","price":0,"found":false}` }
          ]
        }]
      })
    });
    const data = await res.json();
    const text = (data.content || []).map(c => c.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();
    scanResult = JSON.parse(clean);
    document.getElementById("result-name").textContent = scanResult.name || "（読み取れませんでした）";
    document.getElementById("result-price").textContent = scanResult.price ? yen(scanResult.price) : "（読み取れませんでした）";
    document.getElementById("result-preview").src = capturedDataUrl;
    const warn = document.getElementById("result-warn");
    warn.style.display = (!scanResult.name || !scanResult.price) ? "block" : "none";
    setPhase("done");
  } catch(e) {
    setPhase("error", "読み取りに失敗しました。もう一度お試しください。");
  }
}

function confirmResult() {
  if (scanResult) {
    if (scanResult.name) document.getElementById("item-name").value = scanResult.name;
    if (scanResult.price) document.getElementById("item-price").value = scanResult.price;
  }
  closeCamera();
  document.getElementById("item-name").focus();
}

function setPhase(phase, errMsg) {
  const video = document.getElementById("camera-video");
  const preview = document.getElementById("camera-preview");
  const scanOverlay = document.getElementById("scan-overlay");
  const analyzingOverlay = document.getElementById("analyzing-overlay");
  const resultCard = document.getElementById("result-card");
  const errorCard = document.getElementById("error-card");
  const footer = document.getElementById("modal-footer");
  const sub = document.getElementById("modal-sub");
  const viewfinder = document.getElementById("viewfinder");

  // reset
  video.style.display = "none";
  preview.style.display = "none";
  scanOverlay.style.display = "none";
  analyzingOverlay.classList.remove("show");
  resultCard.classList.remove("show");
  errorCard.classList.remove("show");
  viewfinder.style.display = "none";

  const subs = { preview:"値札にカメラを向けて撮影してください", captured:"この画像を解析しますか？", analyzing:"AIが読み取り中...", done:"読み取り完了！内容を確認してください", error:"エラーが発生しました" };
  sub.textContent = subs[phase] || "";

  if (phase === "preview") {
    viewfinder.style.display = "block";
    video.style.display = "block";
    scanOverlay.style.display = "flex";
    footer.innerHTML = '<button class="btn-capture" onclick="capture()">📸 撮影する</button>';
  } else if (phase === "captured") {
    viewfinder.style.display = "block";
    preview.style.display = "block";
    footer.innerHTML = '<button class="btn-retake" onclick="retake()">🔄 撮り直す</button><button class="btn-analyze" onclick="analyze()">🔍 AIで読み取る</button>';
  } else if (phase === "analyzing") {
    viewfinder.style.display = "block";
    preview.style.display = "block";
    analyzingOverlay.classList.add("show");
    footer.innerHTML = '';
  } else if (phase === "done") {
    resultCard.classList.add("show");
    footer.innerHTML = '<button class="btn-retake" onclick="retake()">🔄 撮り直す</button><button class="btn-confirm" onclick="confirmResult()">✅ カートに追加</button>';
  } else if (phase === "error") {
    errorCard.classList.add("show");
    document.getElementById("error-msg").textContent = errMsg || "エラーが発生しました";
    footer.innerHTML = '<button class="btn-retake" onclick="retake()">🔄 もう一度試す</button>';
  }
}

render();
</script>
